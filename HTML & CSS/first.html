<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body>
    <h1>University Registration Form</h1>
    <p>Please fill out the form below to register</p>
    <hr>
    <form action="">
    <h2>Personal Details</h2>
    <label for="name" >First Name:</label>
    <input type="text" name="stname" id="name" placeholder="Enter first name" >
    <br><br>
    <label for="name">Last Name:</label>
    <input type="text" name="surname" id="name" placeholder="Enter last name">
    <br><br>
    <label for="stDOB">DOB:</label>
    <input type="date" name="stDOB" id="stDOB">
    <br><br>
    <label for="gender">Gender:</label>
    <br>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>
    <br>
    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>
    <br>
    <input type="radio" id="other" name="gender" value="other">
    <label for="other">Other</label>
    <br><br>
    <label for="upload">Upload your photo:</label>
    <br>
    <input type="file" id="upload" name="uploadPhoto">
    <hr>
    <h2>Contact Information</h2>
    <label for="email">Email Address:</label>
    <input type="email" id="email" name="emailAdd" placeholder="Enter your email">
    <br><br>
    <label for="telNum">Phone Number:</label>
    <input type="tel" id="telNum" name="phoneNum" placeholder="Enter phone number">
    <br><br>
    <label for="address">Mailing Address:</label>
    <br>
    <textarea name="address" id="address" cols="30" rows="5" placeholder="Street Address, City, State, ZIP Code"></textarea>
    <hr>
    <h2>Academic Information</h2>
    <label for="course">Select Your Course:</label>
    <select name="course" id="course">
        <option value="Choose Your Course">--Choose your Course--</option>
        <option value="computerScience">Computer Science</option>
        <option value="businessAdministration">Business Administration</option>
        <option value="psychology">Psychology</option>
        <option value="engineering">Engineering</option>
        <option value="biology">Biology</option>
    </select>
    <br><br>
    <label for="">ExtraCurricular activities:</label>
    <br>
    <input type="checkbox" id="sports" name="interest" value="sports">
    <label for="sports">Sports</label>
    <br>
    <input type="checkbox" id="M&A" name="interest" value="M&A">
    <label for="M&A">Music and Arts</label>
    <br>
    <input type="checkbox" id="TC" name="interest" value="TC">
    <label for="TC">Technology clubs</label>
    <br>
    <input type="checkbox" id="volunteering" name="interest" value="volunteering">
    <label for="volunteering">Volunteering</label>
    <hr>
    <h2>Create Your Account</h2>
    <label for="password">Create a Password:</label>
    <input type="password" id="password" name="password" placeholder="Enter your password">
    <br><br>
    <label for="">Security Question:</label>
    <select name="course" id="course">
        <option value="Choose Your Course">What was your first pet's name?</option>
        <option value="dog">Dog</option>
        <option value="cow">Cow</option>
        <option value="cat">Cat</option>
        <option value="parrot">Parrot</option>     
    </select>
    <br><br>
    <label for="">Security Answer:</label>
    <input type="text" id="secAnswer" name="secAnswer" placeholder="Enter your answer">
    <br><br>
    <input type="checkbox" id="Terms" name="Terms" value="agree">
    <label for="Terms">I agree to the Terms and Conditions.</label>
    <br><br>
    <hr>
    <button type="submit">Register</button>
    <button type="reset">Clear Form</button>
    </form>
</body>
</html>
