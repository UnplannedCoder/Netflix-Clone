<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form action="">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name"> <!--name attribute isiliye use karte hai taki jab bhi form submit kare to backend me only name na jaae uska name and value dono jaae -->
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
        <br><br>
        <label for="">Gender:</label>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="male"> <!-- value attribute isliye use kia hai taki backend me jaae to vaha gender ki value on/off na leke male,female,other le -->
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="other">Other</label>
        <input type="radio" name="gender" id="other" value="other">
        <br><br>
        <input type="submit" value="submit">
    </form>
</body>
</html>
